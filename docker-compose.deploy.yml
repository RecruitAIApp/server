version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: naqla_redis_deploy
    ports:
      - "6380:6379"
    volumes:
      - redis_deploy_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
  
  backend:
    image: ${DOCKER_IMAGE:-mohamedwael2/recruit-ai-backend:latest}
    container_name: naqla_backend_deploy
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker-background:
    image: ${DOCKER_IMAGE:-mohamedwael2/recruit-ai-backend:latest}
    container_name: naqla_worker_background_deploy
    command: npm run worker
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker-cv:
    image: ${DOCKER_IMAGE:-mohamedwael2/recruit-ai-backend:latest}
    container_name: naqla_worker_cv_deploy
    command: npm run worker:cv
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker-automation:
    image: ${DOCKER_IMAGE:-mohamedwael2/recruit-ai-backend:latest}
    container_name: naqla_worker_automation_deploy
    command: npm run worker:automation
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

volumes:
  redis_deploy_data:
